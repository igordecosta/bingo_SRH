<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Junino - Arraiá da Sorte</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Bangers&family=Roboto:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange-main: #f37021;
            --dark-wood: #2a1a0f;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        /* Container Principal com a Imagem de Fundo */
        .bingo-container {
            position: relative;
            width: 1000px;
            height: 562px;
            background: url('bingo-bg.jpg') no-repeat center center;
            background-size: cover;
            border: 5px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border-radius: 15px;
        }

        /* Número Sorteado (O Grande) */
        .current-number-display {
            position: absolute;
            top: 245px;
            left: 215px;
            width: 275px;
            height: 185px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 110px;
            color: #1a1a1a;
            font-family: 'Luckiest Guy', cursive;
            z-index: 2;
        }

        /* Botão Sorteador */
        #draw-btn {
            position: absolute;
            bottom: 55px;
            left: 212px;
            width: 285px;
            height: 65px;
            background: transparent;
            border: none;
            cursor: pointer;
            outline: none;
            z-index: 10;
        }

        #draw-btn:active {
            transform: scale(0.95);
        }

        /* Painel Lateral de Números Sorteados */
        .history-grid {
            position: absolute;
            top: 152px;
            right: 63px;
            width: 335px;
            height: 335px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 12px;
            padding: 5px;
            box-sizing: border-box;
        }

        .number-ball {
            background: rgba(243, 112, 33, 0.9);
            border: 2px solid #fff;
            border-radius: 50%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
            opacity: 0;
            transform: scale(0);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .number-ball.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Estilo para avisar que acabou */
        .finished {
            font-size: 30px !important;
            color: #d00;
        }
    </style>
</head>
<body>

    <div class="bingo-container">
        <div class="current-number-display" id="mainNumber">--</div>

        <button id="draw-btn" title="Clique para sortear"></button>

        <div class="history-grid" id="historyGrid">
            </div>
    </div>

    <script>
        const mainNumberDisplay = document.getElementById('mainNumber');
        const drawBtn = document.getElementById('draw-btn');
        const historyGrid = document.getElementById('historyGrid');

        let numbersPool = Array.from({length: 75}, (_, i) => i + 1); // Bingo padrão 75 números
        let drawnNumbers = [];

        // Inicializa o grid vazio (apenas visual)
        function initGrid() {
            historyGrid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const ball = document.createElement('div');
                ball.className = 'number-ball';
                ball.id = `ball-${i}`;
                historyGrid.appendChild(ball);
            }
        }

        function drawNumber() {
            if (numbersPool.length === 0) {
                mainNumberDisplay.innerText = "FIM";
                mainNumberDisplay.classList.add('finished');
                return;
            }

            // Sorteio
            const randomIndex = Math.floor(Math.random() * numbersPool.length);
            const selected = numbersPool.splice(randomIndex, 1)[0];
            drawnNumbers.unshift(selected); // Adiciona ao início do histórico

            // Atualiza display principal
            mainNumberDisplay.innerText = selected.toString().padStart(2, '0');

            // Atualiza o grid lateral (mostra os últimos 25 sorteados)
            updateGrid();
        }

        function updateGrid() {
            const balls = document.querySelectorAll('.number-ball');
            balls.forEach((ball, index) => {
                if (drawnNumbers[index]) {
                    ball.innerText = drawnNumbers[index].toString().padStart(2, '0');
                    ball.classList.add('active');
                }
            });
        }

        drawBtn.addEventListener('click', drawNumber);
        initGrid();
    </script>
</body>
</html>
