<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Bingo Junino</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Fredoka', sans-serif;
    overflow:hidden;
    height:100vh;

    background:
    linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)),
    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2000&auto=format&fit=crop');

    background-size:cover;
    background-position:center;

    color:white;
}

/* BARRA SUPERIOR */

.topo{
    width:100%;
    height:120px;
    background:
    url('https://i.imgur.com/8Qf6R0R.png');

    background-size:contain;
    background-repeat:repeat-x;
}

/* CONTAINER PRINCIPAL */

.container{
    display:flex;
    height:calc(100vh - 120px);
    padding:30px 50px;
    gap:40px;
}

/* LADO ESQUERDO */

.esquerda{
    width:60%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.titulo{
    font-size:70px;
    font-weight:700;
    text-shadow:4px 4px 0 #000;
    margin-bottom:10px;
}

.subtitulo{
    font-size:26px;
    margin-bottom:40px;
}

.numero{
    width:380px;
    height:380px;
    background:#ea580c;
    border:12px dashed white;
    border-radius:35px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:180px;
    font-weight:bold;

    box-shadow:
    0 0 50px rgba(0,0,0,.5),
    inset 0 0 25px rgba(255,255,255,.2);

    animation:pulse 1s infinite alternate;
}

@keyframes pulse{
    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.03);
    }
}

button{
    margin-top:35px;

    border:none;
    background:#16a34a;

    color:white;

    font-size:34px;
    font-weight:bold;

    padding:20px 50px;

    border-radius:20px;

    cursor:pointer;

    transition:.3s;

    box-shadow:0 10px 25px rgba(0,0,0,.4);
}

button:hover{
    transform:scale(1.05);
}

/* LADO DIREITO */

.direita{
    width:40%;

    background:rgba(0,0,0,.35);

    border-radius:30px;

    padding:25px;

    backdrop-filter:blur(6px);

    overflow:hidden;
}

.titulo-historico{
    text-align:center;
    font-size:38px;
    margin-bottom:25px;
}

.historico{
    display:flex;
    flex-wrap:wrap;
    gap:15px;

    justify-content:center;
}

.bola{
    width:80px;
    height:80px;

    border-radius:50%;

    background:#dc2626;

    border:5px solid white;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:30px;
    font-weight:bold;

    box-shadow:0 5px 15px rgba(0,0,0,.3);
}

/* RODAPÉ */

.rodape{
    position:absolute;
    bottom:10px;
    width:100%;
    text-align:center;
    font-size:24px;
    animation:pisca 1s infinite alternate;
}

@keyframes pisca{
    from{opacity:0.6;}
    to{opacity:1;}
}

</style>
</head>

<body>

<div class="topo"></div>

<div class="container">

    <div class="esquerda">

        <div class="titulo">
            🌽 BINGO JUNINO 🌽
        </div>

        <div class="subtitulo">
            🎶 Arraiá da Sorte 🎶
        </div>

        <div class="numero" id="numero">
            ?
        </div>

        <button onclick="sortear()">
            🎲 SORTEAR
        </button>

    </div>

    <div class="direita">

        <div class="titulo-historico">
            🔥 Números Sorteados 🔥
        </div>

        <div class="historico" id="historico"></div>

    </div>

</div>

<div class="rodape">
🪗 Pegue sua cartela e boa sorte! 🪗
</div>

<script>

let numeros = [];

for(let i = 1; i <= 75; i++){
    numeros.push(i);
}

function sortear(){

    if(numeros.length === 0){

        alert("Todos os números já foram sorteados!");

        return;
    }

    let indice = Math.floor(Math.random() * numeros.length);

    let numero = numeros[indice];

    numeros.splice(indice,1);

    document.getElementById("numero").innerText = numero;

    let bola = document.createElement("div");

    bola.className = "bola";

    bola.innerText = numero;

    document.getElementById("historico").prepend(bola);

    anunciar(numero);
}

function anunciar(numero){

    let fala = new SpeechSynthesisUtterance(
        `Atenção pessoal do arraiá! Número sorteado ${numero}`
    );

    fala.lang = "pt-BR";

    fala.rate = 0.9;

    speechSynthesis.speak(fala);
}

</script>

</body>
</html>
