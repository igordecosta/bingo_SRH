<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Junino - Arraiá da Sorte</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a0f08;
            font-family: Arial, sans-serif;
        }

        /* Container que usa a sua imagem como fundo */
        .bingo-board {
            position: relative;
            width: 1000px;
            height: 562px;
            /* Usei um link da imagem para garantir que carregue aí */
            background: url('https://img.freepik.com/fotos-premium/festa-junina-banner-com-elementos-de-bingo-e-fogueira_1029473-455797.jpg') no-repeat center center;
            background-size: contain;
            user-select: none;
        }

        /* O número grande que aparece no meio */
        #mainNumber {
            position: absolute;
            top: 242px;
            left: 212px;
            width: 282px;
            height: 188px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 130px;
            color: #1c1c1c;
            font-family: 'Luckiest Guy', cursive;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.5);
        }

        /* Botão invisível sobre o botão de sortear da imagem */
        #draw-btn {
            position: absolute;
            bottom: 52px;
            left: 212px;
            width: 284px;
            height: 68px;
            background: transparent;
            border: none;
            cursor: pointer;
            border-radius: 20px;
        }

        #draw-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Grade de números sorteados na lateral */
        .history-grid {
            position: absolute;
            top: 153px;
            right: 65px;
            width: 332px;
            height: 334px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 12px;
            padding: 5px;
        }

        .ball {
            background: radial-gradient(circle at 30% 30%, #ff8c42, #d35400);
            border: 2px solid #fff;
            border-radius: 50%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s ease;
        }

        .ball.active {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body>

    <div class="bingo-board">
        <div id="mainNumber">--</div>
        <button id="draw-btn" onclick="draw()"></button>
        <div class="history-grid" id="grid"></div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const mainDisplay = document.getElementById('mainNumber');
        let pool = Array.from({length: 75}, (_, i) => i + 1);
        let drawn = [];

        // Cria os espaços das bolinhas
        for (let i = 0; i < 25; i++) {
            const b = document.createElement('div');
            b.className = 'ball';
            grid.appendChild(b);
        }

        function draw() {
            if (pool.length === 0) {
                mainDisplay.innerText = "!!";
                return;
            }

            const idx = Math.floor(Math.random() * pool.length);
            const num = pool.splice(idx, 1)[0];
            drawn.unshift(num);

            mainDisplay.innerText = num.toString().padStart(2, '0');

            const balls = document.querySelectorAll('.ball');
            balls.forEach((ball, i) => {
                if (drawn[i]) {
                    ball.innerText = drawn[i].toString().padStart(2, '0');
                    ball.classList.add('active');
                }
            });
        }
    </script>
</body>
</html>
