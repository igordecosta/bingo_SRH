<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bingo Junino SRH</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Arial, Helvetica, sans-serif;
    }

    .container{
      position:relative;
      width:100vw;
      height:100vh;

      background-image:url('background.jpg');
      background-position:center;
      background-repeat:no-repeat;
      background-size:cover;
    }

    /* =========================================
       NÚMERO GRANDE NO QUADRO BEGE
    ========================================= */

    .numero-atual{
      position:absolute;

      /* AJUSTE FINO */
      left:26.3%;
      top:57%;

      transform:translate(-50%, -50%);

      width:420px;
      height:260px;

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:150px;
      font-weight:900;

      color:#000;

      user-select:none;

      text-shadow:
        2px 2px 0 rgba(255,255,255,0.15);
    }

    /* =========================================
       BOTÃO
    ========================================= */

    .botao-sortear{
      position:absolute;

      left:26.3%;
      top:84%;

      transform:translateX(-50%);

      width:430px;
      height:100px;

      background:transparent;
      border:none;
      cursor:pointer;
    }

    /* =========================================
       NÚMEROS SORTEADOS
    ========================================= */

    .numeros-sorteados{

      position:absolute;

      left:68.7%;
      top:30%;

      transform:translateX(-50%);

      width:420px;
      height:420px;

      display:grid;

      grid-template-columns:repeat(5, 1fr);

      gap:12px;

      align-content:start;

      padding:10px;
    }

    .bola{

      width:58px;
      height:58px;

      border-radius:50%;

      background:#ff9100;

      color:white;

      font-size:24px;
      font-weight:bold;

      display:flex;
      justify-content:center;
      align-items:center;

      box-shadow:
        0 0 10px rgba(255,145,0,0.8),
        0 0 18px rgba(255,145,0,0.4);

      animation:aparecer .25s ease;
    }

    @keyframes aparecer{
      from{
        transform:scale(.3);
        opacity:0;
      }

      to{
        transform:scale(1);
        opacity:1;
      }
    }

    /* =========================================
       RESPONSIVO
    ========================================= */

    @media(max-width:1400px){

      .numero-atual{
        width:320px;
        height:220px;
        font-size:110px;
      }

      .botao-sortear{
        width:320px;
        height:80px;
      }

      .numeros-sorteados{
        width:350px;
      }

      .bola{
        width:48px;
        height:48px;
        font-size:20px;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- Número principal -->
    <div class="numero-atual" id="numeroAtual">
      ?
    </div>

    <!-- Números sorteados -->
    <div class="numeros-sorteados" id="numerosSorteados"></div>

    <!-- Botão invisível -->
    <button class="botao-sortear" id="btnSortear"></button>

  </div>

  <script>

    const btnSortear = document.getElementById('btnSortear');
    const numeroAtual = document.getElementById('numeroAtual');
    const numerosSorteados = document.getElementById('numerosSorteados');

    // Lista de números
    let numeros = [];

    for(let i = 1; i <= 75; i++){
      numeros.push(i);
    }

    // Embaralhar
    numeros = numeros.sort(() => Math.random() - 0.5);

    let indice = 0;

    btnSortear.addEventListener('click', () => {

      if(indice >= numeros.length){
        alert('Todos os números já foram sorteados!');
        return;
      }

      const numero = numeros[indice];
      indice++;

      // Número principal
      numeroAtual.textContent = numero;

      // Adicionar ao quadro
      const bola = document.createElement('div');
      bola.classList.add('bola');
      bola.textContent = numero;

      numerosSorteados.appendChild(bola);

    });

  </script>

</body>
</html>
