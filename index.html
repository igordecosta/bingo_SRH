<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Junino - Arraiá da Sorte</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a0f08;
        }

        .bingo-board {
            position: relative;
            width: 1000px;
            height: 562px;
            /* IMPORTANTE: O nome do arquivo aqui deve ser igual ao que você subir no GitHub */
            background: url('background.jpg') no-repeat center center;
            background-size: cover;
            user-select: none;
        }

        #mainNumber {
            position: absolute;
            top: 242px;
            left: 212px;
            width: 282px;
            height: 188px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 130px;
            color: #1c1c1c;
            font-family: 'Luckiest Guy', cursive;
        }

        #draw-btn {
            position: absolute;
            bottom: 52px;
            left: 212px;
            width: 284px;
            height: 68px;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .history-grid {
            position: absolute;
            top: 153px;
            right: 65px;
            width: 332px;
            height: 334px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 12px;
            padding: 5px;
        }

        .ball {
            background: #f37021;
            border: 2px solid #fff;
            border-radius: 50%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .ball.active { opacity: 1; }
    </style>
</head>
<body>

    <div class="bingo-board">
        <div id="mainNumber">--</div>
        <button id="draw-btn" onclick="draw()"></button>
        <div class="history-grid" id="grid"></div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const mainDisplay = document.getElementById('mainNumber');
        let pool = Array.from({length: 75}, (_, i) => i + 1);
        let drawn = [];

        for (let i = 0; i < 25; i++) {
            const b = document.createElement('div');
            b.className = 'ball';
            grid.appendChild(b);
        }

        function draw() {
            if (pool.length === 0) return;
            const idx = Math.floor(Math.random() * pool.length);
            const num = pool.splice(idx, 1)[0];
            drawn.unshift(num);
            mainDisplay.innerText = num.toString().padStart(2, '0');
            const balls = document.querySelectorAll('.ball');
            balls.forEach((ball, i) => {
                if (drawn[i]) {
                    ball.innerText = drawn[i].toString().padStart(2, '0');
                    ball.classList.add('active');
                }
            });
        }
    </script>
</body>
</html>
