<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bingo Junino</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Fredoka', sans-serif;
    overflow:hidden;
    height:100vh;

    background:
    linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)),
    url('https://images.unsplash.com/photo-1461354464878-ad92f492a5a0?q=80&w=2000&auto=format&fit=crop');

    background-size:cover;
    background-position:center;

    color:white;
}

/* BANDEIRINHAS */

.bandeiras{
    width:100%;
    height:70px;

    background:
    repeating-linear-gradient(
        90deg,
        #f97316 0px,
        #f97316 40px,
        transparent 40px,
        transparent 80px
    );

    clip-path: polygon(
        0 0,
        100% 0,
        100% 35%,
        97% 100%,
        94% 35%,
        91% 100%,
        88% 35%,
        85% 100%,
        82% 35%,
        79% 100%,
        76% 35%,
        73% 100%,
        70% 35%,
        67% 100%,
        64% 35%,
        61% 100%,
        58% 35%,
        55% 100%,
        52% 35%,
        49% 100%,
        46% 35%,
        43% 100%,
        40% 35%,
        37% 100%,
        34% 35%,
        31% 100%,
        28% 35%,
        25% 100%,
        22% 35%,
        19% 100%,
        16% 35%,
        13% 100%,
        10% 35%,
        7% 100%,
        4% 35%,
        1% 100%,
        0 35%
    );
}

/* CONTAINER */

.container{
    display:flex;
    height:calc(100vh - 70px);
    padding:30px 50px;
    gap:40px;
}

/* ESQUERDA */

.esquerda{
    width:60%;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.titulo{
    font-size:72px;
    font-weight:700;

    text-shadow:4px 4px 0 #000;

    margin-bottom:15px;
}

.subtitulo{
    font-size:28px;

    margin-bottom:40px;
}

.numero{
    width:380px;
    height:380px;

    border-radius:35px;

    background:#ea580c;

    border:12px dashed white;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:180px;
    font-weight:bold;

    box-shadow:
    0 0 40px rgba(0,0,0,.5),
    inset 0 0 20px rgba(255,255,255,.15);

    animation:pulse 1s infinite alternate;
}

@keyframes pulse{
    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.03);
    }
}

button{
    margin-top:35px;

    border:none;

    background:#f97316;

    color:white;

    padding:20px 60px;

    font-size:34px;
    font-weight:bold;

    border-radius:20px;

    cursor:pointer;

    transition:.3s;

    box-shadow:0 10px 20px rgba(0,0,0,.35);
}

button:hover{
    transform:scale(1.05);
}

/* DIREITA */

.direita{
    width:40%;

    background:rgba(0,0,0,.35);

    border-radius:30px;

    backdrop-filter:blur(6px);

    padding:25px;

    overflow:hidden;
}

.titulo-historico{
    text-align:center;

    font-size:38px;

    margin-bottom:25px;
}

.historico{
    display:flex;

    flex-wrap:wrap;

    justify-content:center;

    gap:15px;
}

.bola{
    width:80px;
    height:80px;

    border-radius:50%;

    background:#dc2626;

    border:5px solid white;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:30px;
    font-weight:bold;

    box-shadow:0 5px 15px rgba(0,0,0,.3);
}

/* RODAPÉ */

.rodape{
    position:absolute;

    bottom:10px;

    width:100%;

    text-align:center;

    font-size:24px;

    animation:pisca 1s infinite alternate;
}

@keyframes pisca{
    from{
        opacity:0.7;
    }

    to{
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="bandeiras"></div>

<div class="container">

    <div class="esquerda">

        <div class="titulo">
            🌽 BINGO JUNINO 🌽
        </div>

        <div class="subtitulo">
            🔥 Arraiá da Sorte 🔥
        </div>

        <div class="numero" id="numero">
            ?
        </div>

        <button onclick="sortear()">
            SORTEAR
        </button>

    </div>

    <div class="direita">

        <div class="titulo-historico">
            Números Sorteados
        </div>

        <div class="historico" id="historico"></div>

    </div>

</div>

<div class="rodape">
🪗 Boa sorte no bingo! 🪗
</div>

<script>

let numeros = [];

for(let i = 1; i <= 75; i++){
    numeros.push(i);
}

function sortear(){

    if(numeros.length === 0){

        alert("Todos os números já foram sorteados!");

        return;
    }

    let indice = Math.floor(Math.random() * numeros.length);

    let numero = numeros[indice];

    numeros.splice(indice, 1);

    document.getElementById("numero").innerText = numero;

    let bola = document.createElement("div");

    bola.className = "bola";

    bola.innerText = numero;

    document.getElementById("historico").prepend(bola);
}

</script>

</body>
</html>
