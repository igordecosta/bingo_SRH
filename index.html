<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bingo Junino SRH</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      font-family:Arial, Helvetica, sans-serif;
    }

    .container{
      position:relative;
      width:100vw;
      height:100vh;

      background-image:url('background.jpg');
      background-position:center;
      background-repeat:no-repeat;
      background-size:cover;
    }

    /* ===================================
       NÚMERO PRINCIPAL
    =================================== */

    .numero-atual{

      position:absolute;

      left:32%;
      top:58%;

      transform:translate(-50%, -50%);

      width:320px;
      height:220px;

      display:flex;
      justify-content:center;
      align-items:center;

      font-size:170px;
      font-weight:900;

      color:#000;

      user-select:none;
    }

    /* ===================================
       BOTÃO
    =================================== */

    .botao-sortear{

      position:absolute;

      left:32%;
      top:83%;

      transform:translateX(-50%);

      width:420px;
      height:105px;

      border:none;
      background:transparent;

      cursor:pointer;
    }

    /* ===================================
       ÁREA DOS NÚMEROS SORTEADOS
    =================================== */

    .numeros-sorteados{

      position:absolute;

      left:74.2%;
      top:51%;

      transform:translate(-50%, -50%);

      width:470px;
      height:420px;

      display:grid;

      grid-template-columns:repeat(5, 1fr);

      grid-auto-rows:90px;

      justify-items:center;
      align-items:center;
    }

    .bola{

      width:62px;
      height:62px;

      border-radius:50%;

      background:#ff9800;

      display:flex;
      justify-content:center;
      align-items:center;

      color:#fff;

      font-size:24px;
      font-weight:bold;

      box-shadow:
        0 0 15px rgba(255,152,0,0.8),
        0 0 25px rgba(255,152,0,0.5);

      animation:aparecer .25s ease;
    }

    @keyframes aparecer{

      from{
        transform:scale(.2);
        opacity:0;
      }

      to{
        transform:scale(1);
        opacity:1;
      }
    }

    /* ===================================
       RESPONSIVO
    =================================== */

    @media(max-width:1400px){

      .numero-atual{
        font-size:130px;
      }

      .numeros-sorteados{
        width:390px;
      }

      .bola{
        width:52px;
        height:52px;
        font-size:20px;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- Número central -->
    <div class="numero-atual" id="numeroAtual">
      ?
    </div>

    <!-- Números sorteados -->
    <div class="numeros-sorteados" id="numerosSorteados"></div>

    <!-- Botão invisível -->
    <button class="botao-sortear" id="btnSortear"></button>

  </div>

  <script>

    const btnSortear = document.getElementById('btnSortear');
    const numeroAtual = document.getElementById('numeroAtual');
    const numerosSorteados = document.getElementById('numerosSorteados');

    // Lista de números
    let numeros = [];

    for(let i = 1; i <= 75; i++){
      numeros.push(i);
    }

    // Embaralhar
    numeros = numeros.sort(() => Math.random() - 0.5);

    let indice = 0;

    btnSortear.addEventListener('click', () => {

      if(indice >= numeros.length){
        alert('Todos os números já foram sorteados!');
        return;
      }

      const numero = numeros[indice];
      indice++;

      // Número grande
      numeroAtual.textContent = numero;

      // Criar bola
      const bola = document.createElement('div');
      bola.classList.add('bola');
      bola.textContent = numero;

      // Adicionar alinhado no quadro
      numerosSorteados.appendChild(bola);

    });

  </script>

</body>
</html>
