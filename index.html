<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bingo Junino</title>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#000;
    overflow:hidden;
    font-family:'Luckiest Guy',cursive;
}

/* PAINEL PRINCIPAL */

.bingo-board{

    position:relative;

    width:1366px;
    height:768px;

    /* SUA IMAGEM */
    background:url('./background.jpg') no-repeat center center;

    background-size:cover;

    overflow:hidden;
}

/* NÚMERO PRINCIPAL */

#mainNumber{

    position:absolute;

    top:312px;
    left:286px;

    width:350px;
    height:220px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:170px;

    color:#1b120b;

    text-shadow:
    0 4px 8px rgba(0,0,0,.18);

}

/* BOTÃO INVISÍVEL */

#draw-btn{

    position:absolute;

    left:285px;
    bottom:95px;

    width:355px;
    height:102px;

    background:transparent;

    border:none;

    cursor:pointer;

    z-index:20;

}

/* GRID DOS NÚMEROS */

.history-grid{

    position:absolute;

    top:185px;
    right:105px;

    width:420px;
    height:420px;

    display:grid;

    grid-template-columns:repeat(5, 1fr);

    justify-items:center;
    align-items:center;

    row-gap:18px;
    column-gap:10px;
}

/* BOLAS */

.ball{

    width:66px;
    height:66px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at 30% 30%, #ff9f1c, #ef6c00);

    color:white;

    font-size:28px;

    font-family:Arial,sans-serif;
    font-weight:bold;

    border:2px solid rgba(255,255,255,.15);

    box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.08),
    0 4px 10px rgba(0,0,0,.35);

    opacity:0;

    transform:scale(.4);

    transition:.25s;
}

/* ATIVA */

.ball.active{

    opacity:1;

    transform:scale(1);

}

/* ÚLTIMA */

.ball.latest{

    box-shadow:
    0 0 15px #ffe082,
    0 4px 10px rgba(0,0,0,.35);

    border:2px solid #fff1a8;
}

</style>
</head>

<body>

<div class="bingo-board">

    <!-- NÚMERO CENTRAL -->
    <div id="mainNumber">27</div>

    <!-- BOTÃO -->
    <button id="draw-btn" onclick="draw()"></button>

    <!-- GRID -->
    <div class="history-grid" id="grid"></div>

</div>

<script>

const grid = document.getElementById('grid');

const mainDisplay =
document.getElementById('mainNumber');

/* BINGO */

let pool =
Array.from({length:75}, (_,i)=>i+1);

let drawn = [];

/* CRIA 25 ESPAÇOS */

for(let i=0;i<25;i++){

    const b =
    document.createElement('div');

    b.className = 'ball';

    grid.appendChild(b);

}

/* SORTEIO */

function draw(){

    if(pool.length === 0){

        mainDisplay.innerText = 'FIM';

        mainDisplay.style.fontSize = '90px';

        return;
    }

    const idx =
    Math.floor(Math.random()*pool.length);

    const num =
    pool.splice(idx,1)[0];

    drawn.unshift(num);

    mainDisplay.innerText =
    num.toString().padStart(2,'0');

    const balls =
    document.querySelectorAll('.ball');

    balls.forEach((ball,i)=>{

        ball.classList.remove('latest');

        if(drawn[i]){

            ball.innerText =
            drawn[i].toString().padStart(2,'0');

            ball.classList.add('active');

            if(i===0){

                ball.classList.add('latest');

            }

        }

    });

}

</script>

</body>
</html>
