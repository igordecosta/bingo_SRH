<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Junino - Arraiá da Sorte</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a0f08;
            overflow: hidden;
        }

        /* Container Principal */
        .bingo-board {
            position: relative;
            width: 1000px;
            height: 562px;
            background: url('background.jpg') no-repeat center center;
            background-size: cover;
            user-select: none;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* Número Principal (O que acaba de ser sorteado) */
        #mainNumber {
            position: absolute;
            top: 255px; /* Ajustado para centralizar no quadro bege */
            left: 212px;
            width: 282px;
            height: 188px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 130px;
            color: #1c1c1c;
            font-family: 'Luckiest Guy', cursive;
        }

        /* Botão Invisível posicionado sobre a arte */
        #draw-btn {
            position: absolute;
            bottom: 52px;
            left: 212px;
            width: 284px;
            height: 68px;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        #draw-btn:active {
            transform: scale(0.98);
        }

        /* Grade de Bolinhas Sorteadas (Onde estavam saindo tortas) */
        .history-grid {
            position: absolute;
            top: 153px; /* Alinhamento vertical com os círculos da madeira */
            right: 58px; /* Ajuste horizontal para centralizar nas colunas */
            width: 345px;
            height: 338px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 12px 14px; /* Espaçamento calibrado entre as bolinhas */
            padding: 5px;
            box-sizing: border-box;
        }

        .ball {
            background: radial-gradient(circle at 30% 30%, #f37021, #d35400);
            border: 2px solid #fff;
            border-radius: 50%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            width: 54px;
            height: 54px;
            margin: auto;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ball.active {
            opacity: 1;
            transform: scale(1);
        }

        /* Efeito de brilho na última bola sorteada no histórico */
        .ball.latest {
            box-shadow: 0 0 15px #fff;
            border-color: #ffeb3b;
        }
    </style>
</head>
<body>

    <div class="bingo-board">
        <div id="mainNumber">--</div>
        
        <button id="draw-btn" onclick="draw()"></button>
        
        <div class="history-grid" id="grid"></div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const mainDisplay = document.getElementById('mainNumber');
        
        // Bingo de 1 a 75
        let pool = Array.from({length: 75}, (_, i) => i + 1);
        let drawn = [];

        // Inicializa a grade com 25 espaços vazios
        for (let i = 0; i < 25; i++) {
            const b = document.createElement('div');
            b.className = 'ball';
            grid.appendChild(b);
        }

        function draw() {
            if (pool.length === 0) {
                mainDisplay.innerText = "FIM";
                mainDisplay.style.fontSize = "80px";
                return;
            }

            // Sorteia um número e remove da lista
            const idx = Math.floor(Math.random() * pool.length);
            const num = pool.splice(idx, 1)[0];
            
            // Adiciona ao topo da lista de sorteados
            drawn.unshift(num);

            // Atualiza o quadro central
            mainDisplay.innerText = num.toString().padStart(2, '0');

            // Atualiza as bolinhas laterais
            const balls = document.querySelectorAll('.ball');
            balls.forEach((ball, i) => {
                ball.classList.remove('latest');
                if (drawn[i]) {
                    ball.innerText = drawn[i].toString().padStart(2, '0');
                    ball.classList.add('active');
                    if (i === 0) ball.classList.add('latest'); // Destaca a mais recente
                }
            });
        }
    </script>
</body>
</html>
