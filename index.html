<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bingo Junino SRH</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .container{
      position:relative;
      width:100%;
      height:100vh;
      background:url('background.jpg') center center no-repeat;
      background-size:cover;
    }

    /* Área onde o número sorteado aparece */
    .numero-atual{
      position:absolute;
      left:22%;
      top:50%;
      transform:translate(-50%, -50%);
      width:350px;
      height:220px;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:120px;
      font-weight:bold;
      color:#ff7b00;

      text-shadow:
        0 0 10px rgba(255,123,0,0.8),
        0 0 20px rgba(255,123,0,0.6),
        0 0 40px rgba(255,123,0,0.5);

      user-select:none;
    }

    /* Botão invisível sobre o botão da imagem */
    .botao-sortear{
      position:absolute;
      left:22%;
      top:77%;
      transform:translateX(-50%);

      width:370px;
      height:95px;

      background:transparent;
      border:none;
      cursor:pointer;
    }

    .botao-sortear:hover{
      filter:brightness(1.1);
    }

    /* Painel de números sorteados */
    .numeros-sorteados{
      position:absolute;
      right:7%;
      top:20%;

      width:32%;
      height:58%;

      display:grid;
      grid-template-columns:repeat(5, 1fr);
      align-content:start;
      gap:12px;

      padding:20px;
      overflow-y:auto;
    }

    .bola{
      width:55px;
      height:55px;
      border-radius:50%;

      background:rgba(255,140,0,0.95);
      color:white;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:22px;
      font-weight:bold;

      box-shadow:
        0 0 10px rgba(255,140,0,0.6),
        0 0 20px rgba(255,140,0,0.4);

      animation:aparecer 0.3s ease;
    }

    @keyframes aparecer{
      from{
        transform:scale(0);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    @media (max-width: 1200px){

      .numero-atual{
        width:250px;
        height:170px;
        font-size:80px;
      }

      .botao-sortear{
        width:260px;
        height:70px;
      }

      .bola{
        width:42px;
        height:42px;
        font-size:16px;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- Número grande -->
    <div class="numero-atual" id="numeroAtual">
      ?
    </div>

    <!-- Painel de números -->
    <div class="numeros-sorteados" id="numerosSorteados"></div>

    <!-- Botão -->
    <button class="botao-sortear" id="btnSortear"></button>

  </div>

  <script>

    const btnSortear = document.getElementById('btnSortear');
    const numeroAtual = document.getElementById('numeroAtual');
    const numerosSorteados = document.getElementById('numerosSorteados');

    // Gera números de 1 a 75
    let numeros = [];

    for(let i = 1; i <= 75; i++){
      numeros.push(i);
    }

    // Embaralhar
    numeros = numeros.sort(() => Math.random() - 0.5);

    let indice = 0;

    btnSortear.addEventListener('click', () => {

      if(indice >= numeros.length){
        alert('Todos os números já foram sorteados!');
        return;
      }

      const numero = numeros[indice];
      indice++;

      // Mostrar número grande
      numeroAtual.textContent = numero;

      // Adicionar no painel
      const bola = document.createElement('div');
      bola.classList.add('bola');
      bola.textContent = numero;

      numerosSorteados.appendChild(bola);

    });

  </script>

</body>
</html>
